<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <h3 class="text-white">QuickCart</h3>
  <span class="text-white">Cart: <span id="cart-count">0</span></span>
</nav>

<div class="container mt-4">

  <!-- Search + Filter + Sort -->
  <div class="row mb-3">
    <div class="col-md-4">
      <input type="text" id="search" class="form-control" placeholder="Search products...">
    </div>

    <div class="col-md-3">
      <select id="category" class="form-select">
        <option value="all">All Categories</option>
      </select>
    </div>

    <div class="col-md-3">
      <select id="sort" class="form-select">
        <option value="">Sort by Price</option>
        <option value="low">Low to High</option>
        <option value="high">High to Low</option>
      </select>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader" class="text-center">Loading...</div>

  <!-- Products -->
  <div class="row" id="products"></div>

</div>

<!-- Modal -->
<div class="modal fade" id="productModal">
  <div class="modal-dialog">
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
